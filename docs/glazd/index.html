<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glazd — Legal Resources</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-cyan: #00f3ff;
            --cyber-black: #0a0a0c;
            --cyber-gray: #1a1a1f;
        }
        body {
            background-color: var(--cyber-black);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .glass {
            background: rgba(26, 26, 31, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.1);
        }
        .prose h1 { color: var(--cyber-cyan); font-weight: 800; font-size: 2.25rem; margin-bottom: 2rem; border-bottom: 2px solid var(--cyber-cyan); padding-bottom: 0.5rem; display: inline-block; }
        .prose h2 { color: var(--cyber-cyan); font-weight: 700; font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1rem; opacity: 0.9; }
        .prose h3 { color: #fff; font-weight: 600; font-size: 1.25rem; margin-top: 1.5rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.7; color: #cbd5e1; }
        .prose ul { list-style-type: square; padding-left: 1.5rem; margin-bottom: 1rem; color: #cbd5e1; }
        .prose li { margin-bottom: 0.5rem; }
        .prose a { color: var(--cyber-cyan); text-decoration: underline; transition: opacity 0.2s; }
        .prose a:hover { opacity: 0.7; }
        .prose strong { color: #fff; }
        .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background: rgba(255,255,255,0.03); }
        .prose th, .prose td { padding: 0.75rem; border: 1px solid rgba(0,243,255,0.1); text-align: left; }
        .prose th { background: rgba(0,243,255,0.05); color: var(--cyber-cyan); }
        .prose blockquote { border-left: 4px solid var(--cyber-cyan); padding-left: 1rem; font-style: italic; background: rgba(0,243,255,0.03); padding: 1rem; margin: 1rem 0; border-radius: 0 4px 4px 0; }
        
        .nav-link {
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .nav-link.active {
            color: var(--cyber-cyan);
            border-bottom-color: var(--cyber-cyan);
        }
        .glow-button {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .glow-button:hover {
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
        }
    </style>
</head>
<body class="min-h-screen selection:bg-cyan-500/30">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-cyan-500/20 px-6 py-4">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border-2 border-cyan-500 flex items-center justify-center font-mono text-cyan-500 font-bold scale-110">G</div>
                <h1 class="font-mono text-xl tracking-tighter font-bold">GLAZD<span class="text-cyan-500">.legal</span></h1>
            </div>
            <nav id="doc-nav" class="flex gap-6 text-sm font-mono uppercase tracking-widest text-gray-400">
                <button onclick="loadDoc('privacy_policy.md')" class="nav-link hover:text-cyan-500 py-1">Privacy</button>
                <button onclick="loadDoc('terms_of_service.md')" class="nav-link hover:text-cyan-500 py-1">Terms</button>
                <button onclick="loadDoc('data_deletion.md')" class="nav-link hover:text-cyan-500 py-1">Deletion</button>
                <button onclick="loadDoc('child_safety_standards.md')" class="nav-link hover:text-cyan-500 py-1">Safety</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-6 py-12 md:py-20">
        <div id="content-loader" class="hidden flex justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500"></div>
        </div>
        <article id="content" class="prose max-w-none opacity-0 transition-opacity duration-500">
            <!-- Content will be injected here -->
        </article>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 py-12 px-6 bg-black/50">
        <div class="max-w-4xl mx-auto text-center">
            <p class="text-gray-500 text-sm font-mono tracking-widest uppercase mb-4">© 2026 GreedMitya — Glazd Anonymous interest matching</p>
            <div class="flex justify-center gap-4 text-xs text-gray-600">
                <span>Warsaw, EU</span>
                <span>•</span>
                <a href="mailto:senseimitya@gmail.com" class="hover:text-cyan-500 underline">Contact Support</a>
            </div>
        </div>
    </footer>

    <script>
        const contentEl = document.getElementById('content');
        const loaderEl = document.getElementById('content-loader');
        const navLinks = document.querySelectorAll('.nav-link');

        async function loadDoc(filename) {
            // Update UI
            contentEl.style.opacity = '0';
            loaderEl.classList.remove('hidden');
            
            // Update Active link
            navLinks.forEach(link => {
                const label = link.textContent.toLowerCase();
                if (filename.includes(label) || (label === 'privacy' && filename === 'privacy_policy.md')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });

            try {
                // Fetch MD file from current directory
                const response = await fetch(filename);
                if (!response.ok) throw new Error('File not found');
                const markdown = await response.text();
                
                // Render
                contentEl.innerHTML = marked.parse(markdown);
                
                // Show
                setTimeout(() => {
                    loaderEl.classList.add('hidden');
                    contentEl.classList.remove('hidden');
                    contentEl.style.opacity = '1';
                }, 100);

                // Update hash for deep linking
                window.location.hash = filename.replace('.md', '');

            } catch (err) {
                contentEl.innerHTML = `<div class="py-20 text-center"><h1 class="text-red-500">404</h1><p>Document not found: ${filename}</p></div>`;
                loaderEl.classList.add('hidden');
                contentEl.style.opacity = '1';
            }
        }

        // Handle initial load and browser back/forward
        window.addEventListener('load', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash === 'terms_of_service' || hash === 'terms') {
                loadDoc('terms_of_service.md');
            } else if (hash === 'data_deletion' || hash === 'deletion') {
                loadDoc('data_deletion.md');
            } else if (hash === 'child_safety_standards' || hash === 'safety') {
                loadDoc('child_safety_standards.md');
            } else {
                loadDoc('privacy_policy.md');
            }
        });
    </script>
</body>
</html>
